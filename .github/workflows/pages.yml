name: pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "site/**"
      - "docs/**"
      - "assets/**"
      - "README.md"
      - "README.zh-CN.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: prepare static site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R site/. _site/
          cp -R docs _site/docs
          cp -R assets _site/assets
          touch _site/.nojekyll
          perl -0pi -e 's#\.\./docs/#./docs/#g; s#\.\./assets/#./assets/#g' _site/index.html _site/app.js
          test -f _site/index.html
          test -f _site/docs/集成指南.md
          test -f _site/assets/icon.svg

      - name: configure pages
        uses: actions/configure-pages@v6

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v5
