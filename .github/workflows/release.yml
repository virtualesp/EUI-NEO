name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: install linux deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            glslang-tools \
            libvulkan-dev \
            vulkan-tools \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev

      - name: install macos deps
        if: matrix.platform == 'macos'
        shell: bash
        run: brew install glslang vulkan-headers vulkan-loader

      - name: install windows deps
        if: matrix.platform == 'windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.309.0
          vulkan-components: Glslang, SPIRV-Tools
          vulkan-use-cache: true

      - name: configure windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DEUI_BUILD_TEST_FIXTURES=ON

      - name: configure linux
        if: matrix.platform == 'linux'
        shell: bash
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DEUI_BUILD_TEST_FIXTURES=ON -DGLFW_BUILD_WAYLAND=OFF -DGLFW_BUILD_X11=ON

      - name: configure macos
        if: matrix.platform == 'macos'
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DEUI_BUILD_TEST_FIXTURES=ON

      - name: build
        run: cmake --build build --config Release --parallel

      - name: check generated vulkan shaders
        run: cmake --build build --config Release --target eui_check_vulkan_shaders --parallel

      - name: run unit tests
        run: ctest --test-dir build -C Release -L unit --output-on-failure

      - name: install sdk
        shell: bash
        run: cmake --install build --config Release --prefix "$PWD/package-sdk"

      - name: verify installed package
        shell: bash
        run: |
          cmake -S tests/consumers/find-package -B package-consumer -DCMAKE_PREFIX_PATH="$PWD/package-sdk"
          cmake --build package-consumer --config Release --parallel

      - name: package windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $label = "${{ github.ref_name }}"
          $label = $label -replace '[^A-Za-z0-9._-]', '-'
          $arch = "${{ runner.arch }}".ToLowerInvariant()
          $out = "dist/EUI-NEO-$label-windows-$arch-runtime.zip"
          $binDir = "build/Release"
          $runtimeApps = Get-ChildItem examples -Filter *.cpp -File |
            Sort-Object Name |
            ForEach-Object { $_.BaseName }

          $items = @()
          $missing = @()
          foreach ($app in $runtimeApps) {
            $path = Join-Path $binDir "$app.exe"
            if (Test-Path $path) {
              $items += Get-Item $path
            } else {
              $missing += $app
            }
          }
          if ($missing.Count -gt 0) { throw "Missing example runtime outputs: $($missing -join ', ')" }
          if ($items.Count -eq 0) { throw "No example runtime outputs found in $binDir." }
          $items += Get-ChildItem $binDir -Filter *.dll -File -ErrorAction SilentlyContinue
          if (Test-Path "$binDir/assets") { $items += Get-Item "$binDir/assets" }

          Compress-Archive -Path $items.FullName -DestinationPath $out -Force

      - name: package windows sdk
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $label = "${{ github.ref_name }}"
          $label = $label -replace '[^A-Za-z0-9._-]', '-'
          $arch = "${{ runner.arch }}".ToLowerInvariant()
          $out = "dist/EUI-NEO-$label-windows-$arch-sdk.zip"
          Compress-Archive -Path package-sdk/* -DestinationPath $out -Force

      - name: package unix
        if: matrix.platform == 'linux' || matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          label="$(printf '%s' "${GITHUB_REF_NAME}" | tr -cs 'A-Za-z0-9._-' '-')"
          arch="$(printf '%s' "${RUNNER_ARCH:-X64}" | tr '[:upper:]' '[:lower:]')"
          out="dist/EUI-NEO-${label}-${{ matrix.platform }}-${arch}-runtime.tar.gz"

          files=()
          shopt -s nullglob
          runtime_apps=()
          missing=()
          for src in examples/*.cpp; do
            runtime_apps+=("$(basename "$src" .cpp)")
          done
          for app in "${runtime_apps[@]}"; do
            if [ -x "build/$app" ]; then
              files+=("build/$app")
            else
              missing+=("$app")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing example runtime outputs: %s\n' "${missing[*]}" >&2
            exit 1
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No example runtime outputs found in build." >&2
            exit 1
          fi
          while IFS= read -r lib; do
            files+=("$lib")
          done < <(find build -maxdepth 1 -type f \( -name '*.so' -o -name '*.dylib' \))
          if [ -d build/assets ]; then
            files+=("build/assets")
          fi

          tar -czf "$out" "${files[@]}"

      - name: package unix sdk
        if: matrix.platform == 'linux' || matrix.platform == 'macos'
        shell: bash
        run: |
          label="$(printf '%s' "${GITHUB_REF_NAME}" | tr -cs 'A-Za-z0-9._-' '-')"
          arch="$(printf '%s' "${RUNNER_ARCH:-X64}" | tr '[:upper:]' '[:lower:]')"
          out="dist/EUI-NEO-${label}-${{ matrix.platform }}-${arch}-sdk.tar.gz"
          tar -czf "$out" -C package-sdk .

      - name: upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: EUI-NEO-${{ matrix.platform }}-${{ runner.arch }}
          path: dist/*
          if-no-files-found: error

      - name: upload windows release asset
        if: matrix.platform == 'windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes ""
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag | Out-Null
              if ($LASTEXITCODE -ne 0) { throw "Failed to create or find release $tag." }
            }
          }
          Get-ChildItem dist -Filter *.zip -File | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }

      - name: upload unix release asset
        if: (matrix.platform == 'linux' || matrix.platform == 'macos') && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "" || gh release view "$tag" >/dev/null
          find dist -maxdepth 1 -type f -name '*.tar.gz' -print0 | while IFS= read -r -d '' asset; do
            gh release upload "$tag" "$asset" --clobber
          done
